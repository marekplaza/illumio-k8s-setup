## Default values for Illumio Core for Kubernetes.

## @param pce_url - URL for Illumio Server (PCE). Example: mypce.example.com:8443
## @param ilo_cluster_uuid - Cluster ID from PCE. Example: cc4997c1-408b-4f...
## @param ilo_cluster_token - Cluster Token from PCE. Example: 1_170b8aa3dd6d...
## @param ilo_code - Code for C-VEN activation. Example: 1c5ff9c826f63115b0f...
## @param containerRuntime - Underlying container runtime engine. Supported values: containerd (default), docker, crio, k3s_containerd
## @param containerManager - Underlying container management system. Supported values: kubernetes (default), openshift
pce_url: URL_PORT
cluster_id: ILO_CLUSTER_UUID
cluster_token: ILO_CLUSTER_TOKEN
cluster_code: ILO_CODE
containerRuntime: containerd
containerManager: kubernetes

## Release namespace override. Namespace is overridden by default for backward compatibility
## @param namespaceOverride - 
namespaceOverride: illumio-system

## Cluster mode setting
## @param clusterMode - Supported values: legacy (default, PCE manages Pods as Container Workloads), 
## migrateLegacyToClas, 
## clas (PCE manages Kubernetes Workloads),
## migrateClasToLegacy,
## unpair - used to unpair C-VENs from PCE before deletion
clusterMode: legacy

## Degraded mode policy - controls the firewall when PCE is not accessible and Kubelink can't find matching policy for new Workload based on labels
## @param degradedModePolicyFail - Supported values: open (default, communication is allowed), closed (communication is not allowed)
degradedModePolicyFail: open

## Disable Degraded mode
## @param disableDegradedMode - Supported values: true, false (default, degraded mode is enabled)
disableDegradedMode: false

## Enforce NodePort traffic
## @param enforceNodePortTraffic - Supported values: always (default), never
enforceNodePortTraffic: always

## Wait for Policy - Illumio delays the start of Pods until policy is applied
##
waitForPolicy:
  ## @param waitForPolicy.enabled Enable Wait for Policy feature
  enabled: false
  ## @param waitForPolicy.ignoredNamespaces List of namespaces where Illumio doesn't delay start of Pods. Namespaces kube-system and illumio-system, or
  ## other namespace where Illumio is deployed, are ignored by Kubelink for this feature by default, even if not specified in this list.
  ignoredNamespaces:
    - kube-system
  ## @param waitForPolicy.timeout How long will pods wait for policy, in seconds
  timeout: 130

## List of annotations keys reported as a Kubernetes Workload metadata.
userAllowedAnnotations: []

## Image registry creadentials, if specified, illumio-pull-secret will be created
## @param username - The username for image registry account
## @param password - The password for image registry account
imagePullSecret:
  username: ""
  password: ""

## external imagePullSecrets for all images, secrets must be created in the namespace
##   - aSecretName
##
imagePullSecrets: []

## Common parameters
## @param commonLabels - Labels applied to all deployed objects
## @param commonaAnnotations - Annotations applied to all deployed objects
commonLabels: {}
commonAnnotations: {}

## priorityClasses - Assign priority classes to Illumio workloads
priorityClasses:
  ## @param priorityClasses.enabled Kubelink and CVEN will have priority classes assigned, default true
  enabled: true
  ## @param priorityClasses.kubelink The priorityClassName for Kubelink Deployment, default is system-cluster-critical
  kubelink: system-cluster-critical
  ## @param priorityClasses.cven The priorityClassName for CVEN DaemonSet, default is system-node-critical
  cven: system-node-critical

## Image parameters
## @param kubelink.registry - Image registry
## @param kubelink.repo - Image repository
## @param kubelink.imageTag - Image tag
## @param kubelink.imagePullPoicy - Image pull policy
## @param kubelink.pullSecrets - array of imagePullSecrets for this image, secrets must be created in the namespace
## @param kubelink.pceApiTimeout - HTTP request timeout, in seconds, 60 - 7200
## @param kubelink.pceApiMinBackoff - backoff delay before request retry, in seconds, 5 - 600
## @param kubelink.pceApiMaxBackoff - max backoff delay, in seconds, 60 - 1200
## @param kubelink.pceApiPolicyInterval - policy requests interval, in seconds, 10 - 3600
## @param kubelink.lastAppliedPolicyUpdateInterval - frequency of last policy applied at updates, in seconds, 5 - infinity
## @param kubelink.etcdRetryAttempts - number of retry attempts for etcd operations, 1 - 10
kubelink:
  registry: "quay.io/illumio"
  repo: "kubelink"
  imageTag: "5.9.0-3"
  imagePullPolicy: "IfNotPresent"
  pullSecrets: []
  pceApiTimeout: 1200
  pceApiMinBackoff: 60
  pceApiMaxBackoff: 240
  pceApiPolicyInterval: 30
  lastAppliedPolicyUpdateInterval: 120
  etcdRetryAttempts: 3
  supportReportVolumeSize: "2Gi"
  resources:
    limits:
      memory: 600Mi
    requests:
      memory: 500Mi
      cpu: 500m

## @param cven.tolerations C-VEN Daemonset tolerations
## @param cven.maintenanceToken VEN Maintenance Token
## @param cven.aggressiveTamperingDetection enables faster detection of unauthorized firewall changes
cven:
  registry: "quay.io/illumio"
  repo: "cven"
  imageTag: "23.4.11-8-cven23411"
  imagePullPolicy: "IfNotPresent"
  pullSecrets: []
  hostBasePath: "/opt"
  firewallBackend: "auto"
  resources:
    limits:
      memory: 700Mi
    requests:
      memory: 600Mi
      cpu: 500m
  tolerations:
    - effect: NoSchedule
      operator: Exists
  maintenanceToken: ""
  aggressiveTamperingDetection: true

## @param storage.additionalEnv Additional env vars for the etcd storage pod
## Defaults include both snapshot-catchup env var names for etcd 3.6 and 3.7+ compatibility.
storage:
  registry: "quay.io/illumio"
  repo: "storage"
  imageTag: "3.6.8-6"
  imagePullPolicy: "IfNotPresent"
  pullSecrets: []
  sizeGi: 1
  resources:
    limits:
      memory: 600Mi
    requests:
      memory: 500Mi
      cpu: 500m
  additionalEnv:
    - name: ETCD_SNAPSHOT_CATCHUP_ENTRIES
      value: "1"

initcontainer:
  registry: "quay.io/illumio"
  repo: "init-container"
  imageTag: "5.9.0-3"
  imagePullPolicy: "IfNotPresent"

metrics:
  ## @param metrics.enabled Enable data metrics
  ##
  enabled: false

## Enable policy optimization using common labels
## @param policyLabelSetEnable - Supported values: true (default), false
policyLabelSetEnable: true

## Enable reporting of K8s Workloads running in host network
## @param reportHostNetworkKubernetesWorkloads - Supported values: true, false (default)
reportHostNetworkKubernetesWorkloads: false

## @param verbosity - Log verbosity level of Kubelink, and if greater than zero, C-VEN switches to debug log level
##
verbosity: 0

## @param argoCD - Set to true when deploying with ArgoCD
##   
argoCD: false

## @param httpProxy - HTTP proxy to use by Kubelink and C-VEN
##
httpProxy: ""

## @param useTLS - C-VENs to Kubelink gRPC communication is encrypted, and Kubelink manages certificates,
## needs Kubelink >=5.6.0 and C-VEN >=23.4.8
##
useTLS: true
