# Kubelink

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: manage-illumio-secrets
  namespace: {{ include "illumio.namespace" . }}
  {{- if .Values.commonLabels }}
  labels: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
roleRef:
  kind: Role
  name: illumio-secrets-manager
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: illumio-kubelink
    namespace: {{ include "illumio.namespace" . }}
---
{{- if eq .Values.containerManager "openshift" }}
kind: RoleBinding
apiVersion: authorization.openshift.io/v1
metadata:
  name: system:image-puller-illumio-kubelink
  namespace: {{ include "illumio.namespace" . }}
  {{- if .Values.commonLabels }}
  labels: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
roleRef:
  name: system:image-puller
subjects:
  - kind: ServiceAccount
    name: illumio-kubelink
    namespace: {{ include "illumio.namespace" . }}
groupNames:
  - system:serviceaccounts:{{ include "illumio.namespace" . }}
userNames:
  - system:serviceaccount:{{ include "illumio.namespace" . }}:illumio-kubelink
{{ end }}
