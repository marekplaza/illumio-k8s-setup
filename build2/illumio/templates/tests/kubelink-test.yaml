apiVersion: v1
kind: Pod
metadata:
  name: illumio-kubelink-test
  namespace: {{ include "illumio.namespace" . }}
  {{- if .Values.commonLabels }}
  labels: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- end }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    {{- if .Values.commonAnnotations }}
    {{include "illumio.renderDictionary" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  serviceAccountName: illumio-kubelink
  {{- include "renderPullSecrets" ( dict "images" (list .Values.kubelink) "context" $ ) | nindent 2 }}
  containers:
    - name: kubelink-test
      image: "{{ .Values.kubelink.registry }}/{{ .Values.kubelink.repo }}:{{ .Values.kubelink.imageTag }}"
      imagePullPolicy: {{ .Values.kubelink.imagePullPolicy | quote }}
      command: ['/bin/sh', '-c']
      args: ['sleep 30; /kubelink-http http://illumio-kubelink-connection:8080/metrics']
  restartPolicy: Never
---
apiVersion: v1
kind: Service
metadata:
  name: illumio-kubelink-connection
  namespace: {{ include "illumio.namespace" . }}
  {{- if .Values.commonLabels }}
  labels: {{- include "illumio.renderDictionary" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- end }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
    {{- if .Values.commonAnnotations }}
    {{include "illumio.renderDictionary" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      protocol: TCP
  selector:
    app: illumio-kubelink
